#
# Build docs and Teleop web app, then deploy to *this repo's* gh-pages branch.
# The deploy target is always the running repository, so the workflow behaves
# the same on forks as on canonical — each pushes to its own GitHub Pages site.
#
# - Push to main/release on NVIDIA/IsaacTeleop: deploy multi-version docs at
#   site root, web app at /client/.
# - Push to any other branch (canonical or fork) with an open PR against
#   NVIDIA/IsaacTeleop: deploy single-version preview to preview/pr-<N>/, web
#   app at preview/pr-<N>/client/. Pushes without an open PR skip the preview
#   (re-run via "Run workflow" after opening the PR, or push another commit).
#
# Fork setup (one-time, per fork):
#   1. Enable Actions: Settings → Actions → General → Allow all actions.
#   2. Push a branch with docs changes once. The workflow creates `gh-pages`.
#   3. Enable Pages: Settings → Pages → Source = `gh-pages` branch, root.
#   4. (Optional) For the private CloudXR Web SDK, add a repo secret named
#      NGC_TELEOP_CORE_GITHUB_SERVICE_KEY. Without it the public SDK is used.

name: Build & deploy docs

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yaml"
      - "deps/cloudxr/webxr_client/**"
      - "deps/cloudxr/.env.default"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-repo:
    name: Check repo
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      is-deploy-branch: ${{ steps.is-deploy-branch.outputs.defined }}
      pr-number: ${{ steps.find-pr.outputs.number }}
    steps:
      - id: is-deploy-branch
        if: >-
          github.repository == 'NVIDIA/IsaacTeleop'
          && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        run: echo "defined=true" >> "$GITHUB_OUTPUT"

      # Look up the open PR for this branch against NVIDIA/IsaacTeleop. Empty
      # output means no PR yet → preview is skipped downstream.
      - id: find-pr
        if: steps.is-deploy-branch.outputs.defined != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event.repository.fork }}" = 'true' ]; then
            HEAD="${{ github.repository_owner }}:${{ github.ref_name }}"
          else
            HEAD="${{ github.ref_name }}"
          fi
          NUM=$(gh pr list --repo NVIDIA/IsaacTeleop --head "$HEAD" \
                  --state open --json number --jq '.[0].number // empty')
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          if [ -n "$NUM" ]; then
            echo "Found PR #$NUM for head=\`$HEAD\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open PR for head=\`$HEAD\` — preview will be skipped." >> "$GITHUB_STEP_SUMMARY"
          fi

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: [check-repo]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install docs requirements
        working-directory: ./docs
        run: pip install -r requirements.txt

      - name: Build docs for the current branch
        working-directory: ./docs
        run: make current-docs

      - name: Generate multi-version docs
        working-directory: ./docs
        if: needs.check-repo.outputs.is-deploy-branch == 'true'
        run: |
          git fetch --prune --unshallow --tags
          make multi-docs

      - name: Upload docs artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-html
          path: ./docs/build

  build-app:
    name: Build Teleop Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set CloudXR Web SDK version
        id: sdk_version
        run: |
          version=$(grep -E '^CXR_WEB_SDK_VERSION=.+' deps/cloudxr/.env.default | cut -d= -f2)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # Use the private SDK if the running repo has the NGC key set; otherwise
      # fall back to the public SDK (forks without the secret).
      - name: Download CloudXR Web SDK from NGC
        env:
          NGC_API_KEY: ${{ secrets.NGC_TELEOP_CORE_GITHUB_SERVICE_KEY }}
          SDK_VERSION: ${{ steps.sdk_version.outputs.version }}
        run: |
          SDK_FILE="nvidia-cloudxr-${SDK_VERSION}.tgz"
          BASE="https://api.ngc.nvidia.com/v2"
          if [ -z "${NGC_API_KEY:-}" ]; then
            URL="${BASE}/resources/nvidia/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}?download=true"
            curl -fL -o "${SDK_FILE}" "$URL"
          else
            URL="${BASE}/org/0566138804516934/team/cloudxr-dev/resources/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}"
            curl -fL -o "${SDK_FILE}" \
              -H "Authorization: Bearer $NGC_API_KEY" \
              -H "Content-Type: application/json" \
              "$URL"
          fi
          mkdir -p deps/cloudxr
          mv "${SDK_FILE}" deps/cloudxr/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build web client
        working-directory: deps/cloudxr/webxr_client
        run: |
          npm install "../nvidia-cloudxr-${{ steps.sdk_version.outputs.version }}.tgz"
          USE_LOCAL_WEBXR_ASSETS=0 npm run build

      - name: Upload web app artifact
        uses: actions/upload-artifact@v6
        with:
          name: webapp
          path: deps/cloudxr/webxr_client/build

  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: [check-repo, build-docs, build-app]
    permissions:
      contents: write  # push to gh-pages
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: ./docs/build

      - name: Download web app artifact
        uses: actions/download-artifact@v7
        with:
          name: webapp
          path: ./webapp

      - name: Place web app under subpath
        run: |
          if [ "${{ needs.check-repo.outputs.is-deploy-branch }}" = 'true' ]; then
            CLIENT_DIR=./docs/build/client
          else
            CLIENT_DIR=./docs/build/current/client
          fi
          mkdir -p "$CLIENT_DIR"
          cp -r ./webapp/. "$CLIENT_DIR/"

      - name: Deploy to gh-pages root (canonical main/release)
        if: needs.check-repo.outputs.is-deploy-branch == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build
          keep_files: true

      - name: Deploy PR preview to gh-pages
        if: needs.check-repo.outputs.is-deploy-branch != 'true' && needs.check-repo.outputs.pr-number != ''
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/current
          destination_dir: preview/pr-${{ needs.check-repo.outputs.pr-number }}
          keep_files: true

      - name: Add preview URL to workflow summary
        if: needs.check-repo.outputs.is-deploy-branch != 'true' && needs.check-repo.outputs.pr-number != ''
        run: |
          base="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-${{ needs.check-repo.outputs.pr-number }}/"
          client_url="${base}client/"
          {
            echo "## Docs preview"
            echo
            echo "Preview for PR #${{ needs.check-repo.outputs.pr-number }}:"
            echo
            echo "**${base}**"
            echo
            echo "Teleop web app (subpath \`/client/\`): **${client_url}**"
            echo
            echo "(It may take a minute to appear after the workflow completes."
            echo " On a fork, GitHub Pages must be enabled with source = gh-pages.)"
          } >> "$GITHUB_STEP_SUMMARY"
