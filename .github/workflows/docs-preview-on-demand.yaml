#
# Manual docs preview for PRs that can't auto-deploy (fork PRs).
#
# - When a fork PR is opened: post an instructional comment with the slash
#   command. (Same-repo PRs auto-deploy via docs.yaml — they don't need this.)
# - When a user with write access comments `/preview-docs` on any PR: download
#   the matching docs.yaml artifacts for that PR's head SHA and deploy them to
#   NVIDIA/IsaacTeleop/preview/pr-<N>/, reacting to the comment with progress
#   feedback.
#
# This workflow does *not* run any PR code — docs.yaml already built and
# uploaded the artifacts (it runs on every PR, including fork PRs, and only
# the deploy step is gated). /preview-docs is therefore a pure deploy job.
#
# Both jobs run in the canonical repo's context with full secrets and
# permissions (pull_request_target / issue_comment), which is why fork-PR
# previews can be deployed at all. The workflow file is loaded from the
# default branch on each run, so PRs cannot modify it for their own preview.

name: Docs preview on demand

on:
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  greet:
    name: Greet fork PR
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body "$(cat <<EOF
          📝 **Docs preview is not auto-deployed for fork PRs.**

          A maintainer with write access to \`$REPO\` can deploy a preview by
          commenting \`/preview-docs\` on this PR. Once deployed, the preview
          will live at:

          https://nvidia.github.io/IsaacTeleop/preview/pr-$PR/
          EOF
          )"

  preview:
    name: Deploy preview
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && (github.event.comment.body == '/preview-docs' || startsWith(github.event.comment.body, '/preview-docs '))
    runs-on: ubuntu-latest
    concurrency:
      group: preview-pr-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      actions: read         # download artifacts from the matching docs.yaml run
      contents: write       # push to gh-pages
      pull-requests: write  # comment with preview URL
      issues: write         # react to the triggering comment
    steps:
      - name: Verify commenter has write access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          USER: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          PERM=$(gh api "repos/$REPO/collaborators/$USER/permission" --jq '.permission')
          case "$PERM" in
            admin|maintain|write)
              echo "$USER has $PERM access — proceeding."
              ;;
            *)
              gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='-1' >/dev/null
              echo "::error::User $USER has '$PERM' access; /preview-docs requires write or higher." >&2
              exit 1
              ;;
          esac

      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='eyes' >/dev/null

      - name: Get PR head info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          HEAD_SHA=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER"  >> "$GITHUB_OUTPUT"

      # Find the matching docs.yaml run that already built the artifacts. This
      # avoids re-running pip / npm / Sphinx on each /preview-docs invocation.
      - name: Find docs.yaml run for PR head SHA
        id: find-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          RUN_ID=$(gh run list --repo "$REPO" --workflow=docs.yaml \
            --commit "$HEAD_SHA" --status success --limit 1 \
            --json databaseId --jq '.[0].databaseId // ""')
          if [ -z "$RUN_ID" ]; then
            gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
              -f content='-1' >/dev/null
            gh pr comment "$PR" --repo "$REPO" --body "❌ No successful \`Build & deploy docs\` run found for commit \`${HEAD_SHA:0:8}\`. Wait for the build to finish (or push a commit that touches \`docs/\` to trigger one), then re-comment \`/preview-docs\`."
            echo "::error::No successful docs.yaml run for $HEAD_SHA" >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Reusing artifacts from docs.yaml run #$RUN_ID for SHA \`${HEAD_SHA:0:8}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Download docs artifact
        uses: actions/download-artifact@v7
        with:
          name: docs-html
          path: ./docs/build
          run-id: ${{ steps.find-build.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download webapp artifact
        uses: actions/download-artifact@v7
        with:
          name: webapp
          path: ./webapp
          run-id: ${{ steps.find-build.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Place webapp under /client/
        run: |
          mkdir -p ./docs/build/current/client
          cp -r ./webapp/. ./docs/build/current/client/

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/current
          destination_dir: preview/pr-${{ steps.pr.outputs.number }}
          keep_files: true

      - name: Confirm preview deployed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-$PR/"
          gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='+1' >/dev/null
          gh pr comment "$PR" --repo "$REPO" --body "✅ Preview deployed: ${BASE}"
