#
# Manual docs preview for PRs that can't auto-deploy (fork PRs).
#
# - When a fork PR is opened: post an instructional comment with the slash
#   command. (Same-repo PRs auto-deploy via docs.yaml — they don't need this.)
# - When a user with write access comments `/preview` on any PR: build that
#   PR's head and deploy the preview to NVIDIA/IsaacTeleop/preview/pr-<N>/,
#   reacting to the comment with progress feedback.
#
# Both jobs run in the canonical repo's context with full secrets and
# permissions (pull_request_target / issue_comment), which is why fork-PR
# previews can be deployed at all. The workflow file is loaded from the
# default branch on each run, so PRs cannot modify it for their own preview.

name: Docs preview on demand

on:
  pull_request_target:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  greet:
    name: Greet fork PR
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post preview instructions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body "$(cat <<EOF
          📝 **Docs preview is not auto-deployed for fork PRs.**

          A maintainer with write access to \`$REPO\` can deploy a preview by
          commenting \`/preview\` on this PR. Once deployed, the preview will
          live at:

          https://nvidia.github.io/IsaacTeleop/preview/pr-$PR/
          EOF
          )"

  preview:
    name: Deploy preview
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && (github.event.comment.body == '/preview' || startsWith(github.event.comment.body, '/preview '))
    runs-on: ubuntu-latest
    concurrency:
      group: preview-pr-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write       # push to gh-pages
      pull-requests: write  # comment with preview URL
      issues: write         # react to the triggering comment
    steps:
      - name: Verify commenter has write access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          USER: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          PERM=$(gh api "repos/$REPO/collaborators/$USER/permission" --jq '.permission')
          case "$PERM" in
            admin|maintain|write)
              echo "$USER has $PERM access — proceeding."
              ;;
            *)
              gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='-1' >/dev/null
              echo "::error::User $USER has '$PERM' access; /preview requires write or higher." >&2
              exit 1
              ;;
          esac

      - name: Acknowledge command
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='eyes' >/dev/null

      - name: Get PR head info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          DATA=$(gh api "repos/$REPO/pulls/$PR_NUMBER" \
            --jq '{sha: .head.sha, repo: .head.repo.full_name}')
          HEAD_SHA=$(echo "$DATA" | jq -r .sha)
          HEAD_REPO=$(echo "$DATA" | jq -r .repo)
          echo "head_sha=$HEAD_SHA"   >> "$GITHUB_OUTPUT"
          echo "head_repo=$HEAD_REPO" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER"    >> "$GITHUB_OUTPUT"
          echo "Building $HEAD_REPO @ \`$HEAD_SHA\` for PR #$PR_NUMBER" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install docs requirements
        working-directory: ./docs
        run: pip install -r requirements.txt

      - name: Build docs
        working-directory: ./docs
        run: make current-docs

      - name: Set CloudXR Web SDK version
        id: sdk_version
        run: |
          version=$(grep -E '^CXR_WEB_SDK_VERSION=.+' deps/cloudxr/.env.default | cut -d= -f2)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download CloudXR Web SDK from NGC
        env:
          NGC_API_KEY: ${{ secrets.NGC_TELEOP_CORE_GITHUB_SERVICE_KEY }}
          SDK_VERSION: ${{ steps.sdk_version.outputs.version }}
        run: |
          SDK_FILE="nvidia-cloudxr-${SDK_VERSION}.tgz"
          BASE="https://api.ngc.nvidia.com/v2"
          if [ -z "${NGC_API_KEY:-}" ]; then
            URL="${BASE}/resources/nvidia/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}?download=true"
            curl -fL -o "${SDK_FILE}" "$URL"
          else
            URL="${BASE}/org/0566138804516934/team/cloudxr-dev/resources/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}"
            curl -fL -o "${SDK_FILE}" \
              -H "Authorization: Bearer $NGC_API_KEY" \
              -H "Content-Type: application/json" \
              "$URL"
          fi
          mkdir -p deps/cloudxr
          mv "${SDK_FILE}" deps/cloudxr/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build web client
        working-directory: deps/cloudxr/webxr_client
        run: |
          npm install "../nvidia-cloudxr-${{ steps.sdk_version.outputs.version }}.tgz"
          USE_LOCAL_WEBXR_ASSETS=0 npm run build

      - name: Place web app under /client/
        run: |
          mkdir -p ./docs/build/current/client
          cp -r deps/cloudxr/webxr_client/build/. ./docs/build/current/client/

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/current
          destination_dir: preview/pr-${{ steps.pr.outputs.number }}
          keep_files: true

      - name: Confirm preview deployed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ steps.pr.outputs.number }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/preview/pr-$PR/"
          gh api -X POST "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='+1' >/dev/null
          gh pr comment "$PR" --repo "$REPO" --body "✅ Preview deployed: ${BASE}"
