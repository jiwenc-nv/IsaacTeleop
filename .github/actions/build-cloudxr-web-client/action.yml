#
# Reads CXR_WEB_SDK_VERSION from deps/cloudxr/.env.default, downloads the SDK
# from NGC (private if `ngc-api-key` is provided, public otherwise), and runs
# `npm install` + `npm run build`. Output is written to
# deps/cloudxr/webxr_client/build/.

name: Build CloudXR Web Client
description: Download the CloudXR Web SDK from NGC and build the web client.

inputs:
  ngc-api-key:
    description: NGC API key for the private SDK; leave empty to use the public SDK.
    required: false
    default: ''
  node-version:
    description: Node.js version for the web client build.
    required: false
    default: '20'

outputs:
  sdk-version:
    description: CloudXR Web SDK version that was downloaded.
    value: ${{ steps.sdk-version.outputs.version }}

runs:
  using: composite
  steps:
    - id: sdk-version
      shell: bash
      run: |
        version=$(grep -E '^CXR_WEB_SDK_VERSION=.+' deps/cloudxr/.env.default | cut -d= -f2)
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    # Public NGC if no key, private NGC otherwise.
    - name: Download CloudXR Web SDK from NGC
      shell: bash
      env:
        NGC_API_KEY: ${{ inputs.ngc-api-key }}
        SDK_VERSION: ${{ steps.sdk-version.outputs.version }}
      run: |
        SDK_FILE="nvidia-cloudxr-${SDK_VERSION}.tgz"
        BASE="https://api.ngc.nvidia.com/v2"
        if [ -z "${NGC_API_KEY:-}" ]; then
          URL="${BASE}/resources/nvidia/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}?download=true"
          curl -fL -o "${SDK_FILE}" "$URL"
        else
          URL="${BASE}/org/0566138804516934/team/cloudxr-dev/resources/cloudxr-js/versions/${SDK_VERSION}/files/${SDK_FILE}"
          curl -fL -o "${SDK_FILE}" \
            -H "Authorization: Bearer $NGC_API_KEY" \
            -H "Content-Type: application/json" \
            "$URL"
        fi
        mkdir -p deps/cloudxr
        mv "${SDK_FILE}" deps/cloudxr/

    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install and build web client
      shell: bash
      working-directory: deps/cloudxr/webxr_client
      env:
        SDK_VERSION: ${{ steps.sdk-version.outputs.version }}
      run: |
        npm install "../nvidia-cloudxr-${SDK_VERSION}.tgz"
        USE_LOCAL_WEBXR_ASSETS=0 npm run build
