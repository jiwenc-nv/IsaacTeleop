# Reusable base definition for the CloudXR runtime service.
# Compose files can extend this service and add environment/runtime overrides.

services:
  cloudxr-runtime:
    build:
      context: ${CXR_BUILD_CONTEXT:?CXR_BUILD_CONTEXT must point to repository root}
      dockerfile: deps/cloudxr/Dockerfile.runtime
      args:
        PYTHON_VERSION:
        ISAACTELEOP_PIP_SPEC:
        ISAACTELEOP_PIP_FIND_LINKS:
        ISAACTELEOP_PIP_DEBUG:
    container_name: cloudxr-runtime-${CXR_RUNTIME_SDK_VERSION:-unset}-${PYTHON_VERSION:-unset}
    user: "${CXR_UID:-1000}:${CXR_GID:-1000}"
    network_mode: host
    healthcheck:
      test: ["CMD", "test", "-f", "/openxr/.cloudxr/run/runtime_started"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 5s
    runtime: nvidia
    environment:
      - ACCEPT_EULA=${ACCEPT_CLOUDXR_EULA:-Y}
      - NV_CXR_ENABLE_PUSH_DEVICES
      - NV_CXR_ENABLE_TENSOR_DATA
      - NV_DEVICE_PROFILE
      - NV_GPU_INDEX=${NV_GPU_INDEX:-0}
    volumes:
      - openxr-volume:/openxr/

volumes:
  openxr-volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CXR_HOST_VOLUME_PATH:-/tmp/cloudxr}
